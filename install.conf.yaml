- defaults:
    link:
      create: true
      relink: true
    shell:
      stdin: true
      stdout: true
      stderr: true
    brew:
      stdin: true
      stdout: true
      stderr: true

- create:
  - ~/.local/bin
  - ~/.claude/

- clean:
    ~/:
      force: true
    ~/.local/bin:
      force: true

- link:
    ~/.zshrc: zsh/.zshrc
    ~/.vimrc: config/.vimrc
    ~/.jq: config/.jq
    ~/.claude/CLAUDE.md: agents/CLAUDE.md

- ifmacos:
  - shell:
    - description: install brew packages
      command: brew bundle --file=tools/Brewfile
  - link:
      ~/.hammerspoon/init.lua: config/init.lua


- ifanylinux:
  - sudo:
    - apt:
      - zsh
      - tree
      - ripgrep
      - fd-find
      - tldr
      - jq
      - exa
      - bat
      - direnv
      - nvtop
      - gnuplot
  - shell:
    - description: update vendored delta binary
      command: |
        [ "$(uname -m)" = "x86_64" ] || exit 0
        version="$(curl -fsSL https://api.github.com/repos/dandavison/delta/releases/latest | jq -r .tag_name)"
        archive="delta-${version}-x86_64-unknown-linux-musl.tar.gz"
        curl -fsSL "https://github.com/dandavison/delta/releases/download/${version}/${archive}" | tar -xz -C /tmp
        install -m 0755 "/tmp/delta-${version}-x86_64-unknown-linux-musl/delta" tools/bin/delta
        rm -rf "/tmp/delta-${version}-x86_64-unknown-linux-musl"
  - link:
      ~/.local/bin/delta: tools/bin/delta
  - shell:
    - description: install fzf
      command:  tools/github/fzf/install --key-bindings --completion --no-update-rc

    - description: install zoxide
      command: curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | bash

- ifdebian:
  - shell:
    - description: install bat
      command: sudo dpkg -i tools/deb/bat-musl_0.23.0_amd64.deb
